version: '3.8'

services:
  reading-journal:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - reading-journal-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  reading-journal-data:
    driver: local