services:
  reading-journal:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - bookflow_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - bookflow_data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bookflow_data:
    name: bookflow_data
