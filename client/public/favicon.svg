<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Book cover -->
  <rect x="4" y="6" width="20" height="20" rx="1" fill="#3B82F6" stroke="#1E40AF" stroke-width="0.5"/>
  
  <!-- Pages -->
  <rect x="5" y="7" width="18" height="18" rx="0.5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.3"/>
  
  <!-- Text lines -->
  <line x1="7" y1="10" x2="19" y2="10" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="12" x2="21" y2="12" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="14" x2="18" y2="14" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="20" y2="16" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="18" x2="17" y2="18" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="20" x2="19" y2="20" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="22" x2="16" y2="22" stroke="#64748B" stroke-width="0.5" stroke-linecap="round"/>
  
  <!-- Bookmark -->
  <rect x="21" y="4" width="3" height="12" fill="#F59E0B"/>
  <polygon points="21,16 22.5,14 24,16 24,4 21,4" fill="#F59E0B"/>
  
  <!-- Spine highlight -->
  <rect x="4" y="6" width="1" height="20" fill="#60A5FA" opacity="0.7"/>
</svg>