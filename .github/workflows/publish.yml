name: Publish to GHCR

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: set_tag
        run: |
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper]' '[:lower:]')
          TAG="ghcr.io/$LOWER_REPO/bookflow:latest"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.set_tag.outputs.tag }}
